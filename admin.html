<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin FlowEX - NULVEC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; overflow-x: hidden; }
        .bg-pattern { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at 20% 50%, rgba(120, 80, 255, 0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(255, 100, 80, 0.06) 0%, transparent 50%), radial-gradient(ellipse at 50% 80%, rgba(80, 200, 255, 0.06) 0%, transparent 50%); pointer-events: none; z-index: 0; }
        .container { position: relative; z-index: 1; width: 100%; max-width: 960px; padding: 20px; margin: 0 auto; }
        .screen { display: none; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: rgba(22, 22, 38, 0.95); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 40px; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); animation: slideUp 0.5s ease; max-width: 420px; margin: 60px auto; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #7850ff, #50c8ff); border-radius: 18px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 28px; }
        .logo h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #c4b5fd, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logo p { font-size: 13px; color: #666; margin-top: 4px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #999; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 14px 16px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: #fff; font-size: 15px; transition: all 0.3s ease; outline: none; }
        .form-group input:focus { border-color: #7850ff; box-shadow: 0 0 0 3px rgba(120, 80, 255, 0.2); background: rgba(255, 255, 255, 0.08); }
        .btn { padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, #7850ff, #5088ff); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(120, 80, 255, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .alert { padding: 14px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 20px; display: none; animation: slideUp 0.3s ease; }
        .alert.show { display: flex; align-items: center; gap: 10px; }
        .alert-error { background: rgba(255, 80, 80, 0.1); border: 1px solid rgba(255, 80, 80, 0.2); color: #ff8080; }
        .alert-success { background: rgba(48, 200, 112, 0.1); border: 1px solid rgba(48, 200, 112, 0.2); color: #60d890; }
        .alert-warning { background: rgba(255, 180, 50, 0.1); border: 1px solid rgba(255, 180, 50, 0.2); color: #ffd080; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding: 0 20px; }
        .admin-title h1 { font-size: 24px; margin-bottom: 4px; }
        .admin-title p { color: #999; font-size: 13px; }
        .btn-logout { padding: 8px 16px; background: rgba(255, 80, 80, 0.1); border: 1px solid rgba(255, 80, 80, 0.2); border-radius: 8px; color: #ff8080; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .btn-logout:hover { background: rgba(255, 80, 80, 0.2); }
        .admin-card { background: rgba(22, 22, 38, 0.95); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); padding: 32px; animation: slideUp 0.5s ease; }
        .tabs { display: flex; gap: 4px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 4px; margin-bottom: 24px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; color: #666; border: none; background: none; font-family: inherit; text-transform: uppercase; letter-spacing: 0.5px; }
        .tab.active { background: rgba(120, 80, 255, 0.15); color: #a090ff; }
        .section { margin-bottom: 24px; display: none; }
        .section.active { display: block; }
        .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #e0e0e0; }
        .user-list { max-height: 400px; overflow-y: auto; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.06); }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); transition: background 0.2s ease; gap: 8px; }
        .user-item:last-child { border-bottom: none; }
        .user-item:hover { background: rgba(255, 255, 255, 0.03); }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 14px; font-weight: 600; color: #ddd; margin-bottom: 2px; }
        .user-username { font-size: 11px; color: #666; }
        .user-actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; flex-wrap: wrap; }
        .btn-small { padding: 6px 12px; background: rgba(120, 80, 255, 0.15); border: 1px solid rgba(120, 80, 255, 0.3); border-radius: 8px; color: #a090ff; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; white-space: nowrap; }
        .btn-small:hover { background: rgba(120, 80, 255, 0.3); }
        .btn-danger { background: rgba(255, 80, 80, 0.15); border-color: rgba(255, 80, 80, 0.3); color: #ff8080; }
        .btn-danger:hover { background: rgba(255, 80, 80, 0.3); }
        .empty-state { text-align: center; padding: 40px 20px; color: #555; }
        .empty-icon { font-size: 40px; margin-bottom: 12px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(48, 200, 112, 0.15); color: #60d890; border: 1px solid rgba(48, 200, 112, 0.25); }
        .status-badge.expired { background: rgba(255, 80, 80, 0.12); color: #ff8080; border-color: rgba(255, 80, 80, 0.2); }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); font-size: 13px; }
        .history-item:last-child { border-bottom: none; }
        .history-code { font-weight: 700; color: #a090ff; letter-spacing: 3px; font-family: monospace; font-size: 16px; }
        .history-time { color: #555; font-size: 11px; margin-top: 2px; }

        /* PIN modal */
        .pin-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; animation: fadeIn 0.2s ease; }
        .pin-modal { background: #161626; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 36px 32px; width: 340px; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.7); }
        .pin-modal h2 { font-size: 18px; margin-bottom: 6px; }
        .pin-modal .pin-user { color: #a090ff; font-size: 13px; margin-bottom: 20px; }
        .pin-display { font-size: 52px; font-weight: 800; letter-spacing: 8px; font-family: monospace; color: #fff; background: rgba(120,80,255,0.1); border: 2px solid rgba(120,80,255,0.3); border-radius: 14px; padding: 20px 16px; margin-bottom: 12px; }
        .pin-expiry { font-size: 12px; color: #888; margin-bottom: 24px; }
        .pin-expiry span { color: #ffd080; font-weight: 600; }
        .pin-modal-actions { display: flex; gap: 10px; }
        .pin-modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s ease; }
        .pin-modal-btn.copy { background: rgba(120,80,255,0.2); border: 1px solid rgba(120,80,255,0.3); color: #a090ff; }
        .pin-modal-btn.copy:hover { background: rgba(120,80,255,0.35); }
        .pin-modal-btn.close { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #888; }
        .pin-modal-btn.close:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="container">
        <div id="loginScreen" class="screen active">
            <div class="card">
                <div class="logo">
                    <div class="logo-icon">🔐</div>
                    <h1>Panel Admin</h1>
                    <p>Acceso exclusivo - NULVEC</p>
                </div>
                <div id="alertLogin" class="alert"></div>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="username" placeholder="NULVEC" autocomplete="off" value="NULVEC" readonly>
                </div>
                <button class="btn btn-primary" onclick="login()">Acceder al Panel</button>
            </div>
        </div>

        <div id="adminScreen" class="screen">
            <div class="admin-header">
                <div class="admin-title">
                    <h1>🛡️ Panel de Administración</h1>
                    <p>Bienvenido NULVEC - Permisos de Creador</p>
                </div>
                <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
            </div>
            <div class="admin-card">
                <div id="alertAdmin" class="alert"></div>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('tabUsers', this)">👥 Usuarios</button>
                    <button class="tab" onclick="switchTab('tabCreate', this)">➕ Crear</button>
                    <button class="tab" onclick="switchTab('tabHistory', this)">📋 Historial</button>
                </div>

                <div id="tabUsers" class="section active">
                    <div class="section-title">Gestión de Usuarios</div>
                    <div class="user-list" id="userList">
                        <div class="empty-state">
                            <div class="empty-icon">📂</div>
                            <p>Cargando usuarios...</p>
                        </div>
                    </div>
                </div>

                <div id="tabCreate" class="section">
                    <div class="section-title">Crear Nuevo Usuario</div>
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" id="createName" placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" id="createUsername" placeholder="Ej: juanperez" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>PIN inicial (4 dígitos)</label>
                        <input type="text" id="createPin" placeholder="1234" maxlength="4" inputmode="numeric">
                    </div>
                    <button class="btn btn-primary" onclick="createUser()" style="margin-bottom: 10px;">Crear Usuario</button>
                    <button class="btn btn-primary" style="background: rgba(255, 255, 255, 0.1); color: #aaa; margin-bottom: 0;" onclick="generateRandomPin()">🎲 PIN Aleatorio</button>
                </div>

                <div id="tabHistory" class="section">
                    <div class="section-title">Historial de PINs Temporales</div>
                    <div id="historyList" style="border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 12px;">
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <p>No hay registros aún</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBjU04ggwkWLrM5-ZS9167ixsPY9agv_kg",
            authDomain: "flowex-app-cf0ae.firebaseapp.com",
            projectId: "flowex-app-cf0ae",
            storageBucket: "flowex-app-cf0ae.appspot.com",
            messagingSenderId: "317866469877",
            appId: "1:317866469877:web:c6075e8f5ddd1fe36458bc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allUsers = {};

        // ── Generador de PIN seguro ──────────────────────────────
        function generatePin() {
            if (window.crypto && window.crypto.getRandomValues) {
                const arr = new Uint32Array(1);
                window.crypto.getRandomValues(arr);
                return String(1000 + (arr[0] % 9000));
            }
            return String(1000 + Math.floor(Math.random() * 9000));
        }

        // ── UI helpers ───────────────────────────────────────────
        function showAlert(id, msg, type = 'error') {
            const a = document.getElementById(id);
            const icons = { error: '❌', success: '✅', warning: '⚠️' };
            a.className = `alert alert-${type} show`;
            a.innerHTML = `<span>${icons[type] || ''}</span><span>${msg}</span>`;
            setTimeout(() => a.classList.remove('show'), 6000);
        }

        function clearAlerts() {
            document.querySelectorAll('.alert').forEach(el => el.classList.remove('show'));
        }

        function setScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            clearAlerts();
        }

        // ── Auth ─────────────────────────────────────────────────
        function login() {
            const u = document.getElementById('username').value.trim().toUpperCase();
            if (u !== 'NULVEC') {
                showAlert('alertLogin', 'Solo NULVEC puede acceder al panel.', 'error');
                return;
            }
            setScreen('adminScreen');
            loadUsers();
            loadHistory();
        }

        function logout() {
            setScreen('loginScreen');
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (tabId === 'tabHistory') loadHistory();
        }

        // ── Cargar usuarios ──────────────────────────────────────
        async function loadUsers() {
            try {
                const snap = await db.collection('users').get();
                allUsers = {};
                snap.forEach(d => { allUsers[d.id] = d.data(); });
                renderUsers();
            } catch (e) {
                console.error('loadUsers error:', e);
                document.getElementById('userList').innerHTML =
                    `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error: ${e.message}</p></div>`;
            }
        }

        function renderUsers() {
            const c = document.getElementById('userList');
            const keys = Object.keys(allUsers);
            if (!keys.length) {
                c.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><p>No hay usuarios creados aún.</p></div>';
                return;
            }

            const now = Date.now();
            let html = '';
            keys.forEach(k => {
                const u = allUsers[k];
                let badgeHtml = '';

                if (u.tempPin && typeof u.tempPin === 'object') {
                    const isUsed    = u.tempPin.used === true;
                    const expiry    = Number(u.tempPin.expiry || 0);
                    const isExpired = expiry > 0 && now > expiry;

                    if (!isUsed && !isExpired) {
                        const mins = Math.max(0, Math.round((expiry - now) / 60000));
                        badgeHtml = `<span class="status-badge">🔑 Temp (${mins}min)</span>`;
                    } else if (isUsed) {
                        badgeHtml = `<span class="status-badge expired">✅ Temp usado</span>`;
                    } else if (isExpired) {
                        badgeHtml = `<span class="status-badge expired">⏱ Expirado</span>`;
                    }
                }

                html += `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="user-name">${u.name || k}</div>
                            <div class="user-username">@${k} · Lv${u.level || 1} · ${u.xp || 0}XP</div>
                        </div>
                        <div class="user-actions">
                            ${badgeHtml}
                            <button class="btn-small" onclick="genTempPin('${k}')">🔑 Temp PIN</button>
                            <button class="btn-small btn-danger" onclick="delUser('${k}')">🗑️</button>
                        </div>
                    </div>`;
            });
            c.innerHTML = html;
        }

        // ── Crear usuario ────────────────────────────────────────
        function generateRandomPin() {
            document.getElementById('createPin').value = generatePin();
        }

        async function createUser() {
            const name     = document.getElementById('createName').value.trim();
            const username = document.getElementById('createUsername').value.trim().toLowerCase();
            const pin      = document.getElementById('createPin').value.trim();

            if (!name || !username || !pin) {
                showAlert('alertAdmin', 'Completá todos los campos.', 'warning');
                return;
            }
            if (!/^[a-z0-9_]+$/.test(username)) {
                showAlert('alertAdmin', 'Usuario: solo letras minúsculas, números y guiones bajos.', 'error');
                return;
            }
            if (!/^\d{4}$/.test(pin)) {
                showAlert('alertAdmin', 'El PIN debe ser exactamente 4 dígitos numéricos.', 'error');
                return;
            }

            try {
                const existing = await db.collection('users').doc(username).get();
                if (existing.exists) {
                    showAlert('alertAdmin', `El usuario @${username} ya existe.`, 'error');
                    return;
                }

                // Guardar pin como STRING siempre
                await db.collection('users').doc(username).set({
                    username: username,
                    name:     name,
                    pin:      String(pin),   // ← campo plain para login directo
                    tempPin:  null,
                    xp:       0,
                    level:    1,
                    habits:   [],
                    notes:    [],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                showAlert('alertAdmin', `✅ Usuario @${username} creado. PIN inicial: ${pin}`, 'success');
                document.getElementById('createName').value     = '';
                document.getElementById('createUsername').value = '';
                document.getElementById('createPin').value      = '';
                loadUsers();

            } catch (e) {
                console.error('createUser error:', e);
                showAlert('alertAdmin', `Error: ${e.message}`, 'error');
            }
        }

        // ── Generar PIN temporal ─────────────────────────────────
        async function genTempPin(username) {
            try {
                const tmp    = String(generatePin()).trim();  // siempre string limpio "XXXX"
                const expiry = Date.now() + 15 * 60 * 1000; // 15 minutos

                console.log('genTempPin: usuario=', username, 'codigo=', tmp, 'expiry=', expiry);

                // Verificar que el usuario exista
                const userDoc = await db.collection('users').doc(username).get();
                if (!userDoc.exists) {
                    showAlert('alertAdmin', `El usuario @${username} no existe.`, 'error');
                    return;
                }

                // Guardar tempPin con code siempre como STRING
                await db.collection('users').doc(username).update({
                    tempPin: {
                        code:      tmp,
                        expiry:    expiry,
                        used:      false,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    }
                });

                console.log('genTempPin: tempPin guardado para', username);

                // Registrar en historial
                await db.collection('tempPinHistory').add({
                    username:  username,
                    code:      tmp,
                    action:    'generated',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Actualizar lista local
                if (allUsers[username]) {
                    allUsers[username].tempPin = { code: tmp, expiry, used: false };
                }
                renderUsers();

                // Mostrar modal con el PIN
                showPinModal(username, tmp, expiry);

            } catch (e) {
                console.error('genTempPin error:', e);
                showAlert('alertAdmin', `Error generando PIN: ${e.message}`, 'error');
            }
        }

        // ── Modal PIN ────────────────────────────────────────────
        function showPinModal(username, pin, expiry) {
            const mins = Math.round((expiry - Date.now()) / 60000);

            const overlay = document.createElement('div');
            overlay.className = 'pin-modal-overlay';
            overlay.innerHTML = `
                <div class="pin-modal">
                    <h2>🔑 PIN Temporal generado</h2>
                    <p class="pin-user">para @${username}</p>
                    <div class="pin-display">${pin}</div>
                    <div class="pin-expiry">Expira en <span>${mins} minutos</span></div>
                    <div class="pin-modal-actions">
                        <button class="pin-modal-btn copy" onclick="copyPin('${pin}', this)">📋 Copiar PIN</button>
                        <button class="pin-modal-btn close" onclick="this.closest('.pin-modal-overlay').remove()">Cerrar</button>
                    </div>
                </div>`;

            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => {
                if (e.target === overlay) overlay.remove();
            });
        }

        function copyPin(pin, btn) {
            navigator.clipboard.writeText(pin).then(() => {
                btn.textContent = '✅ Copiado';
                setTimeout(() => { btn.textContent = '📋 Copiar PIN'; }, 2000);
            }).catch(() => {
                // Fallback
                const ta = document.createElement('textarea');
                ta.value = pin;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                btn.textContent = '✅ Copiado';
                setTimeout(() => { btn.textContent = '📋 Copiar PIN'; }, 2000);
            });
        }

        // ── Eliminar usuario ─────────────────────────────────────
        async function delUser(username) {
            if (!confirm(`¿Eliminar usuario @${username}? Esta acción no se puede deshacer.`)) return;
            try {
                await db.collection('users').doc(username).delete();
                showAlert('alertAdmin', `✅ Usuario @${username} eliminado.`, 'success');
                loadUsers();
            } catch (e) {
                console.error('delUser error:', e);
                showAlert('alertAdmin', `Error: ${e.message}`, 'error');
            }
        }

        // ── Historial ────────────────────────────────────────────
        async function loadHistory() {
            const c = document.getElementById('historyList');
            try {
                const snap = await db.collection('tempPinHistory')
                    .orderBy('timestamp', 'desc')
                    .limit(30)
                    .get();

                if (snap.empty) {
                    c.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>No hay registros aún</p></div>';
                    return;
                }

                let html = '';
                snap.forEach(d => {
                    const data = d.data();
                    const t = data.timestamp?.toDate
                        ? data.timestamp.toDate().toLocaleString('es-ES')
                        : 'Fecha desconocida';
                    const actionLabel = data.action === 'generated' ? '🔑 Generado' : '✅ Usado';
                    html += `
                        <div class="history-item">
                            <div>
                                <strong>@${data.username}</strong>
                                <div style="font-size:11px;color:#666;margin-top:2px">${actionLabel}</div>
                            </div>
                            <div style="text-align:right">
                                <div class="history-code">${data.code}</div>
                                <div class="history-time">${t}</div>
                            </div>
                        </div>`;
                });
                c.innerHTML = html;

            } catch (e) {
                console.error('loadHistory error:', e);
                c.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error: ${e.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
